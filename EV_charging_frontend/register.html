<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/css/register.css">
    <title>Register</title>
    
</head>
<body>
    <nav>
        <a href="#" class="logo">
            <div class="logo-icon">R</div>
            <div class="logo-text">Regi<span>ster</span></div>
        </a>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

        <button class="nav-btn">Get Started</button>
    </nav>

    <div class="page-wrapper">
        <div class="badge">
            <span>Secure Signup</span>
        </div>

        <div class="container">
            <h2>Register</h2>
            <p class="subtitle">Create your account to continue</p>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Email">

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Password">

            <label for="role">Role</label>
            <select id="role" onchange="toggleCode()">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>

            <!-- Admin Code -->
            <div id="codeDiv" class="hidden">
                <label for="code">Admin Code</label>
                <input type="text" id="code" placeholder="Enter Admin Code">
            </div>

            <button onclick="register()" id="Registerbtn">Register</button>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="btn-outline">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-number">10K+</div>
            <div class="stat-label">Users</div>
        </div>
        <div class="stat-item">
            <div class="stat-number accent">99%</div>
            <div class="stat-label">Secure</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">24/7</div>
            <div class="stat-label">Support</div>
        </div>
    </div>

    <div id="notification-container"></div>
    <script src="static/js/register.js"></script>
</body>
</html>
